# Ansible Inventory Configuration
# Sample inventory file for software inventory queries

[linux_servers]
ubuntu-01 ansible_host=192.168.1.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ubuntu-key.pem
ubuntu-02 ansible_host=192.168.1.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ubuntu-key.pem
rhel-01 ansible_host=192.168.1.20 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/rhel-key.pem
rhel-02 ansible_host=192.168.1.21 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/rhel-key.pem

[windows_servers]
winserver-01 ansible_host=192.168.1.30 ansible_user=Administrator ansible_password="{{ windows_password }}" ansible_connection=winrm ansible_winrm_transport=basic
winserver-02 ansible_host=192.168.1.31 ansible_user=Administrator ansible_password="{{ windows_password }}" ansible_connection=winrm ansible_winrm_transport=basic

[all:vars]
# Common variables for all hosts
ansible_become=true
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3

# Windows-specific timeout
ansible_winrm_read_timeout_sec=30
ansible_winrm_operation_timeout_sec=120

# For local testing with Docker Desktop
[localhost]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

# Host groups by OS
[debian]
ubuntu-01
ubuntu-02

[redhat]
rhel-01
rhel-02

[windows]
winserver-01
winserver-02

[prod]
ubuntu-01
ubuntu-02
rhel-01
rhel-02
winserver-01
winserver-02

[staging]
localhost
