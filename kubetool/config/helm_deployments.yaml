# Helm Deployment Examples and Values Files

## NGINX Ingress Controller

### Installation Values
```yaml
# nginx-ingress-values.yaml
replicaCount: 2

service:
  type: LoadBalancer
  port: 80
  targetPort: 80

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
```

### Install Command
```bash
helm install nginx-ingress nginx-community/nginx-ingress \
  --namespace ingress-nginx \
  --create-namespace \
  -f nginx-ingress-values.yaml
```

