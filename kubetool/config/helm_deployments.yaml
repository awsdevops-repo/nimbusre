## Debugging

### View Pod Logs
```bash
kubectl logs -f deployment/<release-name> -n <namespace>
```

### Check Helm Events
```bash
helm get notes <release-name> -n <namespace>
```

### Test Chart Before Installing
```bash
helm template <release-name> <chart> -f values.yaml
helm lint <chart-path>
```
