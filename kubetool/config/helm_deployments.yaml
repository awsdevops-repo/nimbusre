## PostgreSQL Database

### PostgreSQL Values
```yaml
# postgres-values.yaml
global:
  postgresql:
    username: postgres
    password: "secure-password-here"
    database: myapp

primary:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    size: 100Gi
    storageClassName: standard

replica:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
```

### Install PostgreSQL
```bash
helm repo add bitnami https://charts.bitnami.com/bitnami
helm repo update

helm install postgres bitnami/postgresql \
  --namespace databases \
  --create-namespace \
  -f postgres-values.yaml
```

