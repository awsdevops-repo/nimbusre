## ArgoCD (GitOps Continuous Delivery)

### ArgoCD Values
```yaml
# argocd-values.yaml
replicaCount: 3

server:
  insecure: false
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argocd.example.com
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.example.com

controller:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

redis:
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
```

### Install ArgoCD
```bash
helm repo add argo https://argoproj.github.io/argo-helm
helm repo update

helm install argocd argo/argo-cd \
  --namespace argocd \
  --create-namespace \
  -f argocd-values.yaml
```

