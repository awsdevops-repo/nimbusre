## Redis Cache

### Redis Values
```yaml
# redis-values.yaml
architecture: replication

auth:
  enabled: true
  password: "redis-secure-password"

master:
  persistence:
    enabled: true
    size: 10Gi

replica:
  replicaCount: 2
  persistence:
    enabled: true
    size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

metrics:
  enabled: true
```

### Install Redis
```bash
helm repo add bitnami https://charts.bitnami.com/bitnami
helm repo update

helm install redis bitnami/redis \
  --namespace cache \
  --create-namespace \
  -f redis-values.yaml
```

