## Cert-Manager (Let's Encrypt Integration)

### Cert-Manager Values
```yaml
# cert-manager-values.yaml
replicaCount: 3

installCRDs: true

global:
  leaderElection:
    namespace: cert-manager

serviceAccount:
  create: true
  name: cert-manager

podSecurityPolicy:
  enabled: false

securityContext:
  runAsNonRoot: true
  fsGroup: 1000
```

### Install Cert-Manager
```bash
helm repo add jetstack https://charts.jetstack.io
helm repo update

helm install cert-manager jetstack/cert-manager \
  --namespace cert-manager \
  --create-namespace \
  -f cert-manager-values.yaml
```

